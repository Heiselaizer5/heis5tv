name: Azam Full Token Refresh
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
        working-directory: azam-automation
      - name: Run Azam login script
        working-directory: azam-automation
        run: node azam-login.js
        env:
          AZAM_USERNAME: ${{ secrets.AZAM_USERNAME }}
          AZAM_PASSWORD: ${{ secrets.AZAM_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://yvztqzisrgqybapkdhcr.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2enRxemlzcmdxeWJhcGtkaGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTA1NjAsImV4cCI6MjA5NTk4NjU2MH0.Zx591ai9OQOAfV45PRX2ekcNubdj0tMWJhRakrWOIeU' }}
