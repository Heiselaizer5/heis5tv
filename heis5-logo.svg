<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9d423"/>
      <stop offset="100%" style="stop-color:#ff4e50"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect x="3" y="3" width="194" height="194" rx="41" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <g filter="url(#shadow)">
    <circle cx="100" cy="78" r="30" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>
    <circle cx="100" cy="78" r="12" fill="url(#accent)" opacity="0.15"/>
    <circle cx="100" cy="78" r="30" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4" stroke-dasharray="4 3"/>
    <polygon points="100,55 112,67 108,82 92,82 88,67" fill="url(#gold)" opacity="0.9" filter="url(#glow)"/>
    <text x="100" y="132" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="800" fill="url(#gold)" text-anchor="middle" letter-spacing="3">HEIS5</text>
    <text x="100" y="152" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle" letter-spacing="6">TV</text>
  </g>
</svg>
